  button { margin-top: 20px; padding: 12px 32px; background: #534AB7; color: #EEEDFE; border: none; border-radius: 8px; font-size: 15px; font-family: monospace; cursor: pointer; letter-spacing: 2px; }

<!-- Row 2: Energy -->
<rect x="40" y="258" width="600" height="14" rx="4" class="row-bg"/>

<rect x="40" y="276" width="180" height="52" rx="8" class="c-coral-rect" stroke-width="0.5"/>

<rect x="40" y="522" width="600" height="14" rx="4" class="row-bg"/>

<rect x="40" y="540" width="180" height="52" rx="8" class="c-coral-rect" stroke-width="0.5"/>
<text x="130" y="566" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#712B13">Block data public</text>

<rect x="40" y="624" width="180" height="64" rx="8" class="c-coral-rect" stroke-width="0.5"/>
<text x="130" y="648" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#712B13">Massive energy</text>
<text x="130" y="666" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#712B13">waste</text>

<rect x="250" y="624" width="180" height="64" rx="8" class="c-teal-rect" stroke-width="0.5"/>
<text x="340" y="648" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">Wealth = power,</text>
<text x="340" y="666" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">low barrier to collude</text>

<rect x="460" y="624" width="180" height="64" rx="8" class="c-purple-rect" stroke-width="0.5"/>
<text x="550" y="648" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">Novel — still</text>
<text x="550" y="666" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">being battle-tested</text>

<!-- Footer -->
<rect x="220" y="716" width="240" height="32" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="736" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">@PsyProtocol · psy.xyz</text>
</svg>`;

const canvas = document.getElementById('c');
const scale = 2;
canvas.width = 680 * scale;
canvas.height = 820 * scale;
canvas.style.width = '680px';
canvas.style.height = '820px';
const ctx = canvas.getContext('2d');
ctx.scale(scale, scale);

const img = new Image();
const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
const url = URL.createObjectURL(blob);
img.onload = () => { ctx.drawImage(img, 0, 0); URL.revokeObjectURL(url); };
img.src = url;

function downloadPNG() {
  const link = document.createElement('a');
  link.download = 'pow2_infographic_psy.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
